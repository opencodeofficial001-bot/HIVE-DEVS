<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE DEVS — Open Code</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--black:#0A0A0A;--black-3:#1A1A1A;
--yellow:#FFD600;--white:#F0F0F0;--grey:#888;
--font-display:'Orbitron',sans-serif;
--font-mono:'Share Tech Mono',monospace;
--font-body:'Rajdhani',sans-serif;
}
body{background:var(--black);color:var(--white);font-family:var(--font-body)}

.nav{display:flex;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid rgba(255,214,0,.1)}
.logo{font-family:var(--font-display);font-weight:900}
.logo span{color:var(--yellow)}
.btn{border:1px solid var(--yellow);color:var(--yellow);padding:.4rem 1rem;text-decoration:none;font-family:var(--font-mono)}

.container{max-width:1100px;margin:auto;padding:2rem}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1rem}
.card{
background:var(--black-3);
padding:1.5rem;
border:1px solid #222;
cursor:pointer;
transition:.2s;
}
.card:hover{border-color:var(--yellow);box-shadow:0 0 10px rgba(255,214,0,.2)}

.title{font-family:var(--font-display);margin-bottom:.5rem}
.meta{font-family:var(--font-mono);font-size:.75rem;color:var(--grey)}

.form{margin-bottom:2rem;border:1px solid rgba(255,214,0,.2);padding:1rem}

input,textarea{
width:100%;margin:.5rem 0;padding:.6rem;background:#111;border:1px solid #333;color:#fff
}

button{padding:.6rem;background:var(--yellow);border:none;font-weight:bold;cursor:pointer;margin-top:.5rem}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#111;
padding:2rem;
max-width:800px;
width:100%;
border:1px solid rgba(255,214,0,.2);
max-height:80vh;
overflow:auto;
}

pre{
background:#000;
padding:1rem;
overflow:auto;
color:#0f0;
white-space:pre-wrap;
}

.close{cursor:pointer;float:right;font-size:18px}

.loader{text-align:center;color:#888;margin-top:2rem}
</style>
</head>
<body>

<div class="nav">
<div class="logo">HIVE<span>DEVS</span></div>
<a href="#" class="btn">Voltar</a>
</div>

<div class="container">

<h1 style="font-family:var(--font-display);margin-bottom:1rem">Open Code</h1>

<div class="form">
<input id="name" placeholder="Nome do código">
<input id="lang" placeholder="Linguagem">
<input id="author" placeholder="Seu nome">
<textarea id="code" placeholder="Cole seu código aqui"></textarea>
<button onclick="publish()">Publicar</button>
</div>

<input id="search" placeholder="Buscar por linguagem..." oninput="filterList()">

<div class="grid" id="list"></div>
<div id="loading" class="loader">Carregando...</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="outsideClick(event)">
<div class="modal-box">
<span class="close" onclick="closeModal()">✕</span>
<h2 id="m-title"></h2>
<p id="m-meta"></p>

<button onclick="copyCode()">📋 Copiar código</button>
<button id="deleteBtn" onclick="deleteCode()" style="display:none;background:red;color:#fff">🗑️ Deletar</button>

<pre id="m-code"></pre>
</div>
</div>

<script>
const DB='https://codigo-44625-default-rtdb.firebaseio.com';

let allCodes = [];
let currentCode = null;

// ID
function genId(){
return Date.now()+Math.random().toString(36).slice(2)
}

// SAFE HTML
function escapeHTML(str){
return str.replace(/[&<>"']/g, function(tag){
const chars = {
  '&': '&amp;',
  '<': '&lt;',
  '>': '&gt;',
  '"': '&quot;',
  "'": '&#39;'
};
return chars[tag] || tag;
});
}

// PUBLICAR
async function publish(){
const name=nameInput.value.trim();
const lang=langInput.value.trim();
const author=authorInput.value.trim();
const code=codeInput.value;

if(!name||!lang||!author||!code)return alert('Preencha tudo');

const id=genId();

await fetch(`${DB}/codes/${id}.json`,{
method:'PUT',
body:JSON.stringify({
name,lang,author,code,createdAt:Date.now()
})
});

nameInput.value='';
langInput.value='';
authorInput.value='';
codeInput.value='';

load();
}

// LOAD
async function load(){
document.getElementById('loading').style.display='block';

try{
const res=await fetch(`${DB}/codes.json`);
const data=await res.json();

if(!data){
list.innerHTML='<p style="color:#888">Nenhum código ainda</p>';
return;
}

allCodes = Object.entries(data)
.map(([id,c])=>({id,...c}))
.sort((a,b)=>b.createdAt-a.createdAt);

render(allCodes);

}catch(e){
console.error(e);
}finally{
document.getElementById('loading').style.display='none';
}
}

// RENDER
function render(codes){
list.innerHTML='';

codes.forEach(c=>{
const div=document.createElement('div');
div.className='card';

div.innerHTML=`
<div class="title">${escapeHTML(c.name)}</div>
<div class="meta">${escapeHTML(c.lang)} • por ${escapeHTML(c.author)}</div>
`;

div.onclick=()=>openModal(c);
list.appendChild(div);
});
}

// 🔍 FILTRO
function filterList(){
const term = search.value.trim().toLowerCase();

// se vazio → mostra tudo
if(term === ""){
render(allCodes);
return;
}

const filtered = allCodes.filter(c =>
(c.lang || "").toLowerCase().includes(term)
);

render(filtered);
}

// MODAL
function openModal(c){
currentCode = c;

modal.style.display='flex';
mTitle.textContent=c.name;
mMeta.textContent=c.lang+' • '+c.author;
mCode.textContent=c.code;

// verificar autor
const user = authorInput.value.trim();
if(user && user === c.author){
deleteBtn.style.display='inline-block';
}else{
deleteBtn.style.display='none';
}
}

function closeModal(){
modal.style.display='none';
}

function outsideClick(e){
if(e.target.id==='modal') closeModal();
}

// 📋 COPIAR
function copyCode(){
navigator.clipboard.writeText(mCode.textContent);
alert('Código copiado!');
}

// 🗑️ DELETAR
async function deleteCode(){
const user = authorInput.value.trim();

if(user !== currentCode.author){
return alert('Você não pode deletar isso');
}

if(!confirm('Tem certeza que deseja deletar?')) return;

await fetch(`${DB}/codes/${currentCode.id}.json`,{
method:'DELETE'
});

closeModal();
load();
}

// REFS
const nameInput=document.getElementById('name');
const langInput=document.getElementById('lang');
const authorInput=document.getElementById('author');
const codeInput=document.getElementById('code');

const modal=document.getElementById('modal');
const mTitle=document.getElementById('m-title');
const mMeta=document.getElementById('m-meta');
const mCode=document.getElementById('m-code');

const search=document.getElementById('search');
const deleteBtn=document.getElementById('deleteBtn');

// INIT
load();
</script>

</body>
</html>
