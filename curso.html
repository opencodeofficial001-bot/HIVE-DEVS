<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE DEVS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0A0A;color:#fff;font-family:'Rajdhani'}

.nav{
display:flex;
justify-content:space-between;
padding:1rem 2rem;
border-bottom:1px solid #222;
}

.logo{font-family:'Orbitron';font-weight:900}
.logo span{color:#FFD600}
.btn{cursor:pointer;color:#FFD600}

.container{padding:2rem;max-width:1200px;margin:auto}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:1.5rem;
}

.card{
position:relative;
background:#111;
border-radius:16px;
overflow:hidden;
transition:.4s;
cursor:pointer;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
opacity:.8;
}

.card-content{
padding:1rem;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,214,0,0.3);
}

.card:hover img{
opacity:1;
}

button{
width:100%;
padding:.6rem;
background:#FFD600;
border:none;
cursor:pointer;
margin-top:.5rem;
border-radius:6px;
}

.back{
margin-bottom:1rem;
background:#222;
color:#fff;
}

.progress{
height:6px;
background:#222;
margin-top:1rem;
}

.progress-bar{
height:100%;
background:#FFD600;
width:0%;
}

.player{
position:fixed;
inset:0;
background:#000;
display:none;
}

iframe{
width:100%;
height:100%;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="nav">
<div class="logo">HIVE<span>DEVS</span></div>
<div>
<span class="btn" onclick="loadDashboard()">Dashboard</span>
</div>
</div>

<!-- CURSOS -->
<div id="courses" class="container">
<button class="back" onclick="goIndex()">⬅ Voltar</button>
<h1>Catálogo</h1>
<div class="grid"></div>
</div>

<!-- MODULOS -->
<div id="modules" class="container" style="display:none">
<button class="back" onclick="showCourses()">⬅ Voltar</button>
<h1>Módulo</h1>
<div id="moduleList" class="grid"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container" style="display:none">
<button class="back" onclick="showCourses()">⬅ Voltar</button>
<h1>Progresso</h1>
<div id="progressList" class="grid"></div>
</div>

<!-- PLAYER -->
<div id="player" class="player">
<span class="close" onclick="closePlayer()">✕</span>
<div id="yt"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let currentCourse, currentLesson;
let interval, lastSaved = 0;
let coursesData = [];

// carregar JSON
async function loadCourses(){
  const res = await fetch('courses.json');
  const data = await res.json();
  coursesData = data.courses;
  renderCourses();
}

// render catálogo
function renderCourses(){
  const grid = document.querySelector('#courses .grid');
  grid.innerHTML = '';

  coursesData.forEach(course=>{
    grid.innerHTML += `
      <div class="card" onclick="openCourse('${course.id}')">
        <img src="${course.thumbnail}">
        <div class="card-content">
          <h3>${course.title}</h3>
          <p>${course.description}</p>
        </div>
      </div>
    `;
  });
}

function goIndex(){
  window.location.href = "index.html";
}

function showCourses(){
  document.getElementById('courses').style.display='block';
  document.getElementById('modules').style.display='none';
  document.getElementById('dashboard').style.display='none';
}

// abrir curso
function openCourse(id){
  currentCourse = coursesData.find(c=>c.id===id);

  document.getElementById('courses').style.display='none';
  document.getElementById('modules').style.display='block';

  const list = document.getElementById('moduleList');
  list.innerHTML = '';

  currentCourse.lessons.forEach(l=>{
    list.innerHTML += `
      <div class="card">
        <div class="card-content">
          <h3>${l.title}</h3>
          <button onclick="openLesson('${l.id}')">Assistir</button>
        </div>
      </div>
    `;
  });
}

// abrir aula
function openLesson(id){
  currentLesson = currentCourse.lessons.find(x=>x.id===id);

  document.getElementById('player').style.display='block';

  if(player){
    player.loadVideoById(currentLesson.video);
  }else{
    player = new YT.Player('yt',{
      videoId: currentLesson.video,
      events:{ onReady: onReady }
    });
  }
}

function onReady(){
  resume();
  clearInterval(interval);
  interval = setInterval(saveProgress, 3000);
}

// salvar progresso
function saveProgress(){
  if(!player) return;

  const current = player.getCurrentTime();
  const duration = player.getDuration();
  if(!duration) return;

  const percent = (current/duration)*100;

  if(Math.abs(percent - lastSaved) > 5){
    lastSaved = percent;

    localStorage.setItem(
      `progress_${currentCourse.id}_${currentLesson.id}`,
      JSON.stringify({
        time: current,
        progress: percent
      })
    );
  }
}

// retomar
function resume(){
  const data = JSON.parse(
    localStorage.getItem(`progress_${currentCourse.id}_${currentLesson.id}`)
  );

  if(data && player){
    player.seekTo(data.time || 0);
  }
}

// fechar player
function closePlayer(){
  document.getElementById('player').style.display='none';
  if(player){
    player.stopVideo();
  }
}

// dashboard
function loadDashboard(){
  document.getElementById('courses').style.display='none';
  document.getElementById('modules').style.display='none';
  document.getElementById('dashboard').style.display='block';

  const container = document.getElementById('progressList');
  container.innerHTML = '';

  coursesData.forEach(c=>{
    let total = 0, count = 0;

    c.lessons.forEach(l=>{
      const data = JSON.parse(localStorage.getItem(`progress_${c.id}_${l.id}`));
      if(data){
        total += data.progress;
        count++;
      }
    });

    const avg = count ? Math.floor(total/count) : 0;

    container.innerHTML += `
      <div class="card">
        <div class="card-content">
          <h3>${c.title}</h3>
          <div class="progress">
            <div class="progress-bar" style="width:${avg}%"></div>
          </div>
          <p>${avg}% completo</p>
        </div>
      </div>
    `;
  });
}

// iniciar
loadCourses();
</script>

</body>
</html>
